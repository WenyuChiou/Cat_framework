# ─────────────────────────────────────────────────────────────
# CAT411 Analysis Configuration
# ─────────────────────────────────────────────────────────────
# This file controls which bridges to analyze, which IM to use,
# and fragility/calibration parameters. All sections are optional;
# defaults are used when omitted.

# ── 1. Region ────────────────────────────────────────────────
# Bounding box to filter bridge inventory (lat/lon in degrees).
# Omit to use the default Northridge greater-LA area.
region:
  lat_min: 33.8
  lat_max: 34.6
  lon_min: -118.9
  lon_max: -118.0

# ── 2. Bridge Selection ──────────────────────────────────────
# Filters applied to the NBI data AFTER Hazus classification.
#   Exact match:       county: "037"
#   Numeric >=/<=/>/< : year_built: ">1960"
#   List of values:     material: ["concrete", "steel"]
#
# Available NBI columns:
#   structure_number, state, county, latitude, longitude,
#   year_built, material, material_code, design_code,
#   num_spans, structure_length_m, deck_width_m, condition_rating
bridge_selection:
  # county: "037"
  # year_built: ">1960"
  # material: ["concrete"]

# HWB class filter (list of Hazus bridge class codes)
# hwb_filter: ["HWB5", "HWB17"]

# Design era filter: "conventional" (pre-1975) or "seismic" (post-1975)
# design_era: "conventional"

# ── 3. IM Source ─────────────────────────────────────────────
# Where to get Intensity Measure values for each bridge.
#   shakemap : Read from USGS ShakeMap grid.xml (default, most accurate)
#   gmpe     : Calculate from GMPE using scenario parameters below
im_source: shakemap

# ── 3b. GMPE Model (for im_source: gmpe) ──────────────────
# Which GMPE to use for ground motion prediction.
#
# Full models (official coefficients, production-ready):
#   bssa21           : Boore, Stewart, Seyhan & Atkinson (2014/2021)
#                      NGA-West2, PGA + 107 spectral periods, recommended
#
# Simplified models (representative coefficients, PGA only, for comparison):
#   ask14            : Abrahamson, Silva & Kamai (2014)
#   bssa14_simplified: Boore, Stewart, Seyhan & Atkinson (2014) simplified
#   cb14             : Campbell & Bozorgnia (2014)
#   cy14             : Chiou & Youngs (2014)
#   idriss14         : Idriss (2014)
#   gk15             : Graizer & Kalkan (2015)
#   nga_east         : Generic NGA-East composite
#
# gmpe_model: bssa21

# ── 4. Intensity Measure ─────────────────────────────────────
# Which IM type to use for fragility analysis.
# Options: PGA, SA03 (Sa 0.3s), SA10 (Sa 1.0s), SA30 (Sa 3.0s)
im_type: SA10

# ── 5. Spatial Interpolation ─────────────────────────────────
# Method used to assign ShakeMap grid IM to bridge locations.
# Options:
#   nearest          : Nearest grid point (fastest, default)
#   idw              : Inverse Distance Weighting (smooth, configurable)
#   bilinear         : Bilinear grid interpolation (regular grids)
#   natural_neighbor : Voronoi/Delaunay-based (good for irregular data)
#   kriging          : Ordinary Kriging (geostatistical, most accurate)
interpolation:
  method: nearest
  # IDW-specific settings:
  # power: 2.0               # distance exponent (higher = more local)
  # n_neighbors: 8           # number of nearby grid points to use
  # Kriging-specific settings:
  # range_km: 50.0           # variogram range (Sa 1.0s ≈ 40-50 km)
  # nugget: 0.01             # measurement noise

# ── 6. GMPE Scenario (for im_source: gmpe) ───────────────────
# Only used when im_source is set to "gmpe".
# Defines the earthquake scenario for GMPE-based IM calculation.
# To use: set im_source: gmpe and uncomment gmpe_scenario + gmpe_model.
# gmpe_scenario:
#   Mw: 6.7                 # Moment magnitude
#   lat: 34.213             # Epicenter latitude (Northridge)
#   lon: -118.537           # Epicenter longitude
#   depth_km: 18.4          # Hypocentral depth
#   fault_type: reverse     # strike_slip, normal, reverse, unspecified
#   vs30: 360               # Default site Vs30 (m/s), used if NBI has no vs30

# ── 7. Fragility Parameters ──────────────────────────────────
# Override Hazus defaults for specific HWB classes.
# fragility_overrides:
#   HWB5:
#     slight:    {median: 0.30, beta: 0.55}
#     moderate:  {median: 0.50, beta: 0.55}
#     extensive: {median: 0.70, beta: 0.55}
#     complete:  {median: 1.00, beta: 0.55}

# ── 8. Calibration ───────────────────────────────────────────
# Factors applied to fragility medians to adjust vulnerability.
# factor < 1.0 → more vulnerable; factor > 1.0 → less vulnerable
# calibration:
#   global_median_factor: 1.0
#   class_factors:
#     HWB5: 0.90
#     HWB17: 1.10

# ── 9. Analysis Settings ─────────────────────────────────────
analysis:
  n_realizations: 50
  n_events: 50
  seed: 42

# ── 10. Validation ──────────────────────────────────────────────
# Compare pipeline predictions against observed damage data.
# validation:
#   enabled: true
#   data: data/validation/northridge_validation_full.csv
#   im_source: gmpe          # gmpe or shakemap
